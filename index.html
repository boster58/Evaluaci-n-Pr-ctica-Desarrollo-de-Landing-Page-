<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paseo de Mascotas</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- mi estilo  -->
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>

    
    <header class="bg-primary text-white text-center py-4">
        <h1>Paseo de Mascotas</h1>
        <img src="img/1.jpg" alt="Logo Paseo de Mascotas" width="80">
    </header>

    <!-- barra superior  -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Inicio</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#servicios">Servicios</a></li>
                    <li class="nav-item"><a class="nav-link" href="#nosotros">Nosotros</a></li>
                    <li class="nav-item"><a class="nav-link" href="#contacto">Contacto</a></li>
                </ul>
            </div>
        </div>
    </nav>

    
    <main class="container my-5">

        <!-- Carousel que implemeta imagenees que se encuentran en el priyecto  -->
        <section id="galeria" class="mb-5">
            <h2 class="text-center mb-4">Galería de Paseos</h2>
            <div id="carouselMascotas" class="carousel slide" data-bs-ride="carousel">
                <div class="carousel-inner">

                    <div class="carousel-item active">
                        <img src="img/2.webp" class="d-block w-100" alt="Paseo individual de mascotas">
                    </div>

                    <div class="carousel-item">
                        <img src="img/3.jpg" class="d-block w-100" alt="Paseo grupal de mascotas">
                    </div>

                    <div class="carousel-item">
                        <img src="img/4.webp" class="d-block w-100" alt="Cuidado en casa">
                    </div>

                </div>
                <!-- Controles -->
                <button class="carousel-control-prev" type="button" data-bs-target="#carouselMascotas" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon"></span>
                    <span class="visually-hidden">Anterior</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#carouselMascotas" data-bs-slide="next">
                    <span class="carousel-control-next-icon"></span>
                    <span class="visually-hidden">Siguiente</span>
                </button>
            </div>
        </section>

        
    </main>

    
    <footer class="bg-dark text-white text-center py-3">
        <p>&copy; 2026 Paseo de Mascotas ANO </p>
    </footer>

    <!-- Sección de comentarios -->
<section id="comentarios" class="mb-5">
  <h2 class="text-center mb-4">Comentarios</h2>
  <div class="container">
    <form>
      <div class="mb-3">
        <label for="nombre" class="form-label">Nombre</label>
        <input type="text" class="form-control" id="nombre" placeholder="Tu nombre">
      </div>
      <div class="mb-3">
        <label for="comentario" class="form-label">Comentario</label>
        <textarea class="form-control" id="comentario" rows="4" placeholder="Escribe tu comentario aquí..."></textarea>
      </div>
      <button type="submit" class="btn btn-primary">Publicar</button>
    </form>
  </div>
</section>


    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
